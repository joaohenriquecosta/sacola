# =============================================================================
# Sacola — local Postgres
#
# Commands (from project root):
#   npm run services:up      Start Postgres in the background
#   npm run services:stop    Stop the container (data persists)
#   npm run services:down    Remove the container and network (data persists in volume)
#   npm run services:wait:db Wait until Postgres accepts connections
#
# Inspect:
#   docker ps                            list running containers
#   docker logs sacola_postgres          tail database logs
# =============================================================================
services:
  database:
    container_name: sacola_postgres
    image: "postgres:16.6-alpine"
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
    volumes:
      - sacola_pgdata:/var/lib/postgresql/data

  # SMTP catcher for local dev + tests. Replaces sj26/mailcatcher with the
  # actively-maintained mailpit (smaller image, same idea: SMTP in, web UI to
  # inspect, HTTP API to fetch/delete messages programmatically).
  #   SMTP:    localhost:1025 (no auth)
  #   Web UI:  http://localhost:8025
  #   API:     http://localhost:8025/api/v1/messages
  mailpit:
    container_name: sacola_mailpit
    image: "axllent/mailpit:v1.21"
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

volumes:
  sacola_pgdata:
